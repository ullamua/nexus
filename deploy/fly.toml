app = "nexus"
primary_region = "sin"

[build]
  dockerfile = "deploy/Dockerfile"

[env]
  NEXUS_PORT = "8080"
  NEXUS_LOG_LEVEL = "info"
  NEXUS_CONNECTORS_DIR = "/connectors.d"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "3s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
