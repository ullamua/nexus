version: "3.9"

services:
  nexus:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NEXUS_VAULT_KEY=${NEXUS_VAULT_KEY}
      - NEXUS_PORT=8080
      - NEXUS_LOG_LEVEL=info
      - NEXUS_CONNECTORS_DIR=/connectors.d
      - NEXUS_DASHBOARD=${NEXUS_DASHBOARD:-false}
      - NEXUS_TRACE=${NEXUS_TRACE:-false}
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./connectors.d:/connectors.d:ro
      - nexus_vault:/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  nexus_vault:
  redis_data:
